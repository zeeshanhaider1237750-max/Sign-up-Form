<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up-Form</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Syne+Tactile&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Pliant:ital,wght@0,100..900;1,100..900&family=Syne+Tactile&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main" class="main">
      <div id="left-side" class="left-side">
        <div id="L-img" class="L-img">
          <img src="images/background.jpg" alt="afternoon Image" />
        </div>
        <div id="odin-Logo" class="odin-Logo">
          <img
            src="images/odin-logo.png"
            alt="Odin Logo"
            id="logo"
            class="logo"
            draggable="false"
          />
          <p id="odin" class="odin">ODIN</p>
        </div>
        <div id="left-text" class="left-text">
          <p>Photo by <u>Annie Spratt</u> on <u>Unsplash</u></p>
        </div>
      </div>
      <div id="right-side" class="right-side">
        <div id="form-container" class="form-container">
          <div id="first" class="first">
            <div id="first-portion" class="first-portion">
              <div id="text" class="text">
                <p id="main-text" class="main-text">
                  <b>
                    This is not a real online service! you know you need
                    something
                    <br />
                    like this in your life to help you realize your deepest
                    dreams.
                    <br />
                  </b>
                </p>
                <div id="lines" class="lines">
                  <p id="sec-line" class="sec-line">
                    <b> Sign up now to get started.</b>
                  </p>
                  <p id="last-line" class="last-line">
                    <b>You know you want to.</b>
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div id="second" class="second">
            <div id="second-portion" class="second-portion">
              <p id="txt" class="txt"><b>Let's do this!</b></p>
            </div>
            <div id="forms" class="forms">
              <form action="#" method="post" id="form" class="form">
                <div id="f1" class="f1">
                  <div class="one" id="one">
                    <label for="first_name" id="first-name">FIRST NAME</label>
                    <input
                      type="text"
                      id="first_name"
                      name="first_name"
                      class="input"
                      required
                    />
                  </div>
                  <div class="two" id="two">
                    <label for="second_name" id="second-name">
                      SECOND NAME</label
                    >
                    <input
                      type="text"
                      id="second_name"
                      name="second_name"
                      class="input"
                      required
                    />
                  </div>
                </div>
                <div id="f2" class="f2">
                  <div class="three" id="three">
                    <label for="Email" id="email.com"> EMAIL</label>
                    <input
                      type="email"
                      id="Email"
                      name="email"
                      class="input"
                      required
                    />
                  </div>
                  <div class="four" id="four">
                    <label for="phone_number" id="phone-number">
                      PHONE NUMBER</label
                    >
                    <input
                      type="tel"
                      id="phone_number"
                      name="phone_number"
                      class="input"
                      required
                    />
                  </div>
                </div>
                <div id="f3" class="f3">
                  <div class="five" id="five">
                    <label for="password" id="Password"> PASSWORD</label>
                    <input
                      type="password"
                      id="password"
                      name="password"
                      class="input"
                      required
                    />
                  </div>
                  <div class="six" id="six">
                    <label for="confirm_password" id="confirm-password">
                      CONFIRM PASSWORD</label
                    >
                    <input
                      type="password"
                      id="confirm_password"
                      name="confirm_password"
                      class="input"
                      required
                    />
                  </div>
                </div>
                <div id="btn" class="btn">
                <button type="submit" id="button" class="button">
                  Create Account
                </button>
              </div>
              <div id="btn-text" class="btn-text">
                <p>Already have an Account?</p>
                <div id="log-in" class="log-in">Log in</div>
              </div>
              </form>
            </div>
          </div>

          </div>
        </div>
      </div>
    </div>
  </body>
</html>
