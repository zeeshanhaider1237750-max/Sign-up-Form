<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up-Form</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Syne+Tactile&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main" class="main">
      <div id="left-side" class="left-side">
        <div id="L-img" class="L-img">
          <img src="images/background.jpg" alt="Leaves Image" />
        </div>
        <div id="odin-Logo" class="odin-Logo">
          <img
            src="images/odin-logo.png"
            alt="Odin Logo"
            id="logo"
            class="logo"
          />
          <p id="odin" class="odin">ODIN</p>
        </div>
        <div id="left-text" class="left-text">
          <p>Photo by <u>Halie West</u> on <u>Unsplash</u></p>
        </div>
      </div>
      <div id="right-side" class="right-side">
        <div id="first-portion" class="first-portion">
          <p id="main-text" class="main-text">
            This is not a real online service! you know you need something like
            this in your life to help you realize your deepest dreams.
          </p>
          <p id="sec-line" class="sec-line">Sign up now to get started.</p>
          <p id="last-line" class="sec-line">You know you want to.</p>
        </div>
        <div id="second-portion" class="second-portion">
          <p>Let's do this!</p>
        </div>
        <div id="third-portion" class="third-portion">
          <button type="submit">Create Account</button>
          <p>Already have an Account?</p>
          <div id="log-in" class="log-in">Log in</div>
        </div>
      </div>
    </div>
  </body>
</html>
